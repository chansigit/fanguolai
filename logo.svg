<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg)" />
  <!-- Mouse body -->
  <rect x="65" y="55" width="70" height="100" rx="35" ry="35" fill="white" opacity="0.95"/>
  <!-- Scroll wheel -->
  <rect x="95" y="72" width="10" height="22" rx="5" fill="#6366f1" opacity="0.8"/>
  <!-- Divider line -->
  <line x1="100" y1="55" x2="100" y2="95" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Up arrow (reversed - pointing down on top) -->
  <path d="M 100 130 L 88 118 L 96 118 L 96 108 L 104 108 L 104 118 L 112 118 Z" fill="#6366f1" opacity="0.7"/>
  <!-- Swap arrows on the right side -->
  <g transform="translate(155, 85)">
    <!-- Up arrow -->
    <path d="M 0 -8 L 8 2 L 4 2 L 4 8 L -4 8 L -4 2 L -8 2 Z" fill="white" opacity="0.9"/>
    <!-- Down arrow -->
    <path d="M 0 30 L -8 20 L -4 20 L -4 14 L 4 14 L 4 20 L 8 20 Z" fill="white" opacity="0.9"/>
    <!-- Curved swap arrows -->
    <path d="M 10 4 Q 18 11 10 18" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M -10 18 Q -18 11 -10 4" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
</svg>
